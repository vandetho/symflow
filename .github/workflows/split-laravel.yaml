name: Split Laravel Package

on:
    push:
        branches: [main]
        paths:
            - "packages/laravel/**"

jobs:
    split:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate token
              id: token
              uses: actions/create-github-app-token@v3
              with:
                  client-id: ${{ secrets.BOT_CLIENT_ID }}
                  private-key: ${{ secrets.BOT_PRIVATE_KEY }}

            - name: Install splitsh-lite
              run: |
                  curl -L https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar -xz
                  chmod +x splitsh-lite
                  sudo mv splitsh-lite /usr/local/bin/

            - name: Split and push
              env:
                  GH_TOKEN: ${{ steps.token.outputs.token }}
              run: |
                  SHA=$(splitsh-lite --prefix=packages/laravel)
                  git remote add laraflow https://x-access-token:${GH_TOKEN}@github.com/vandetho/laraflow.git || true
                  git push laraflow ${SHA}:refs/heads/main --force

name: Publish to npm

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/ts
        environment: release
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
                  cache-dependency-path: packages/ts/package-lock.json
            - run: npm ci
            - run: npm run build
            - run: npm publish --access public --provenance
